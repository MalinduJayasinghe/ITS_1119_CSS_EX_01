<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="World best web development tutorials">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CASE 04</title>
    <link rel="stylesheet" href="../Assets/lib/normalize.css">

    <style>

        section{
            width: 100vw;
            height: 100vh;
        }

        header{
            position: sticky;
            top: 0;
            width: 100%;
            height: 10vh;
            text-align: left;
            padding-left: 10px;
            display: flex;
            align-items: center;
            font-size: 25px;
            font-weight: bold;
            z-index: 1;
        }

        #h1{
            background: red;
            color: white;
        }

        #h2{
            top: 0;
            background: blue;
            color: white;
        }

        #h3{
            top: 0;
            background: black;
            color: white;
        }

        #h4{
            top: 0;
            background: darkred;
            color: white;
        }

        div{
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 90px;
            font-weight: bold;
            z-index: 0;
        }

        #div2{
            background: deepskyblue;
        }

        #div3{
            background: dimgray;
        }

        #div4{
            background: coral;
        }

    </style>

</head>
<body>

<section>
    <header id = "h1">Card 01</header>
    <div id = "div1">Hello</div>
</section>

<section>
    <header id = "h2">Card 02</header>
    <div id = "div2">How</div>
</section>

<section>
    <header id = "h3">Card 03</header>
    <div id = "div3">Are</div>
</section>

<section>
    <header id = "h4">Card 04</header>
    <div id = "div4">You..?</div>
</section>

</body>
</html>
